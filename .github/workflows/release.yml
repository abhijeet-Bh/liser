name: Compile and Deploy Multi-Platform Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: android
          - os: macos-latest
            target: macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract version from commit message
        id: get_version
        shell: bash
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" =~ release\ -\ (v[a-zA-Z0-9\.\-]+) ]]; then
            # Strip the 'v' for the Debian package version (which expects numbers)
            RAW_VERSION="${BASH_REMATCH[1]#v}"
            echo "tag=v$RAW_VERSION" >> $GITHUB_OUTPUT
            echo "deb_version=$RAW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "deb_version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      # ==========================================
      # ENVIRONMENT SETUPS
      # ==========================================
      - name: Set up Java (For Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # ==========================================
      # ANDROID BUILD STEP
      # ==========================================
      - name: Build Android APK
        if: matrix.target == 'android'
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ./liser-Android.apk

      # ==========================================
      # MACOS BUILD STEP
      # ==========================================
      - name: Build macOS DMG
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          # Fixed target directory path pointing to liser.app instead of PixelMusic.app
          hdiutil create -format UDZO -srcfolder build/macos/Build/Products/Release/liser.app ./liser-Mac.dmg



      # ==========================================
      # UNIVERSAL DEPLOYMENT STEP
      # ==========================================
      - name: Upload Binaries to Release Page
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            ./*.apk
            ./*.dmg