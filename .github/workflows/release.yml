name: Compile and Deploy Multi-Platform Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-android
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # ENVIRONMENT SETUPS
      # ==========================================
      - name: Set up Java (For Android)
        if: matrix.target == 'linux-android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # ==========================================
      # LINUX & ANDROID BUILD STEP
      # ==========================================
      - name: Build Android APK, Linux Tarball & Debian Package
        if: matrix.target == 'linux-android'
        run: |
          # 1. Build Android APK
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ./liser-Android.apk
          
          # 2. Install Linux Compilation Requirements
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release
          
          # 3. Create Linux .tar.gz bundle
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../liser-Linux.tar.gz *
          cd '../../../../..'
          
          # 4. Generate native Linux .deb Package
          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/bin
          mkdir -p deb-pkg/usr/share/liser
          
          cp -r build/linux/x64/release/bundle/* deb-pkg/usr/share/liser/
          ln -s /usr/share/liser/liser deb-pkg/usr/bin/liser
          
          cat <<EOT > deb-pkg/DEBIAN/control
          Package: liser
          Version: 1.0.${{ github.run_number }}
          Section: sound
          Priority: optional
          Architecture: amd64
          Maintainer: Open Source Developer <developer@example.com>
          Description: Local and YouTube streaming audio player built using Flutter.
          EOT
          
          dpkg-deb --build deb-pkg ./liser-Linux.deb

      # ==========================================
      # MACOS BUILD STEP
      # ==========================================
      - name: Build macOS DMG
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          # Fixed target directory path pointing to liser.app instead of PixelMusic.app
          hdiutil create -format UDZO -srcfolder build/macos/Build/Products/Release/liser.app ./liser-Mac.dmg

      # ==========================================
      # WINDOWS BUILD STEP
      # ==========================================
      - name: Build Windows Executable Bundle
        if: matrix.target == 'windows'
        shell: pwsh
        # Bypasses MSVC 14.51 coroutine deprecation barrier natively
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath .\liser-Windows.zip

      # ==========================================
      # UNIVERSAL DEPLOYMENT STEP
      # ==========================================
      - name: Upload Binaries to Release Page
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./*.apk
            ./*.deb
            ./*.tar.gz
            ./*.dmg
            ./*.zip