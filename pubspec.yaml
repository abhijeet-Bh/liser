name: liser
description: "A local music player."
publish_to: "none"

version: 1.2.2-beta

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^17.3.0
  get_it: ^9.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  permission_handler: ^12.0.1
  file_picker: ^11.0.2
  uuid: ^4.5.1
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  google_fonts: ^6.2.1
  id3: ^1.0.2
  audio_metadata_reader: ^1.6.0
  just_audio_background: ^0.0.1-beta.17
  shared_preferences: ^2.5.5
  flutter_slidable: ^4.0.3
  http: ^1.6.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0
  package_info_plus: ^9.0.1
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.6.0+eol


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.21.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/liser-logo.png"
  min_sdk_android: 21
